apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: uptime-dev
spec:
  serviceName: postgres-headless
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: db-sa
      initContainers:
        - name: init-replica
          image: postgres:16-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ "$(hostname)" = "postgres-0" ]; then
                echo "Primary node — skipping basebackup"
                exit 0
              fi
              echo "Replica node — waiting for primary..."
              until pg_isready -h postgres-0.postgres-headless.uptime-dev.svc.cluster.local \
                               -U "$POSTGRES_USER"; do
                echo "Waiting..."; sleep 3
              done
              PGPASSWORD="$POSTGRES_PASSWORD" pg_basebackup \
                -h postgres-0.postgres-headless.uptime-dev.svc.cluster.local \
                -D /var/lib/postgresql/data/pgdata \
                -U "$POSTGRES_USER" -P \
                --wal-method=stream \
                --checkpoint=fast || true
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: db-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
